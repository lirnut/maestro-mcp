# hosts.yaml — define your machine fleet
# Copy this file:  cp hosts.example.yaml hosts.yaml
# Then edit with your real host definitions.
#
# Each host needs:
#   alias: must match a Host entry in ~/.ssh/config
#   description: human-readable description (shown in tool instructions)
#
# Optional:
#   shell: bash (default) or powershell
#   is_local: true if this is the hub machine (direct execution, no SSH)
#   display_name: override the display name (defaults to the YAML key)
#   password: auto-auth password (uses sshpass, auto-deploys SSH key on success)
#   auto_deploy_key: true (default) to auto-deploy public key after password auth

hosts:
  workstation:
    alias: ssh-workstation
    description: "Main dev box, Arch Linux"
    is_local: true

  gpu-box:
    alias: ssh-gpu
    description: "Training rig, Ubuntu 24.04"

  macbook:
    alias: ssh-macbook
    description: "MacBook Pro, on the go"

  windows-pc:
    alias: ssh-winpc
    description: "Windows 11, PowerShell"
    shell: powershell

  windows-wsl:
    alias: ssh-winpc-wsl
    description: "WSL2 on windows-pc (ProxyJump)"

  # Example with password for auto-authentication
  # remote-server:
  #   alias: ssh-remote
  #   description: "Remote server with password auth"
  #   password: "your-password-here"
  #   auto_deploy_key: true  # Auto-deploy SSH key on first successful connection
